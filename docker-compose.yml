version: '3.9'

services:
  # ── PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: glitchcraft-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchcraft_db
      POSTGRES_USER: glitchcraft
      POSTGRES_PASSWORD: Abookhan@786
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchcraft -d glitchcraft_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glitchcraft-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://glitchcraft:Abookhan@786@postgres:5432/glitchcraft_db
      JWT_SECRET: ${JWT_SECRET:-glitchcraft-super-secret-jwt-2024-change-me}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:80
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY:-glitchcraft-admin-2024}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && node prisma/seed.js && node src/app.js"

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: glitchcraft-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg_data:
  uploads:
